<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deepak Restaurant</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <header class="app-header no-print">
      <div class="brand">
        <div class="logo" aria-hidden="true">DR</div>
        <div>
          <div class="title">Deepak Restaurant</div>
          <div class="subtitle">Menu • Billing • Sales</div>
        </div>
      </div>

      <nav class="tabs" role="navigation" aria-label="Main">
        <button class="tab is-active" data-tab="pos" type="button">POS</button>
        <button class="tab" data-tab="manage" type="button">Manage Menu</button>
        <button class="tab" data-tab="report" type="button">Monthly Report</button>
      </nav>
    </header>

    <main class="app">
      <section class="view is-active" id="view-pos" aria-label="POS">
        <div class="layout">
          <section class="panel">
            <div class="panel-header">
              <h2>Menu</h2>
              <div class="panel-actions">
                <input id="menuSearch" class="input" placeholder="Search menu…" autocomplete="off" />
              </div>
            </div>
            <div id="menuGrid" class="menu-grid" aria-live="polite"></div>
          </section>

          <aside class="panel bill" aria-label="Bill">
            <div class="panel-header">
              <h2>Cart & Bill</h2>
              <div class="panel-actions">
                <button id="clearCartBtn" class="btn btn-ghost" type="button">Clear cart</button>
              </div>
            </div>

            <div class="bill-meta">
              <div class="row">
                <div class="label">Customer</div>
                <input id="customerName" class="input" placeholder="(optional)" />
              </div>
              <div class="row">
                <div class="label">Table</div>
                <input id="tableNo" class="input" placeholder="(optional)" />
              </div>
            </div>

            <div id="cartList" class="cart" aria-live="polite"></div>

            <div class="totals">
              <div class="line">
                <span>Subtotal</span>
                <strong id="subtotalText">₹0.00</strong>
              </div>
              <div class="line">
                <span>Tax (%)</span>
                <div class="inline">
                  <input id="taxPct" class="input input-sm" type="number" min="0" step="0.5" value="0" />
                </div>
              </div>
              <div class="line grand">
                <span>Total</span>
                <strong id="totalText">₹0.00</strong>
              </div>
            </div>

            <div class="bill-actions no-print">
              <button id="payNowBtn" class="btn btn-primary" type="button">Pay now (QR)</button>
              <button id="completeSaleBtn" class="btn" type="button">Complete sale</button>
              <button id="printBtn" class="btn btn-ghost" type="button">Print bill</button>
            </div>

            <div class="print-only print-header">
              <div class="print-title">Deepak Restaurant</div>
              <div id="printMeta" class="print-meta"></div>
            </div>

            <div class="print-only print-footer">
              <div>Thank you. Visit again.</div>
            </div>
          </aside>
        </div>
      </section>

      <section class="view" id="view-manage" aria-label="Manage menu">
        <div class="layout one">
          <section class="panel">
            <div class="panel-header">
              <h2>Manage Menu (CRUD)</h2>
              <div class="panel-actions">
                <button id="resetMenuBtn" class="btn btn-ghost" type="button">Reset to default</button>
              </div>
            </div>

            <form id="menuForm" class="form">
              <input type="hidden" id="menuId" />
              <div class="grid2">
                <div>
                  <label class="label" for="menuName">Item name</label>
                  <input id="menuName" class="input" placeholder="e.g., Idly" required />
                </div>
                <div>
                  <label class="label" for="menuPrice">Price (₹)</label>
                  <input id="menuPrice" class="input" type="number" min="0" step="1" placeholder="e.g., 30" required />
                </div>
              </div>
              <div class="grid2">
                <div>
                  <label class="label" for="menuCategory">Category</label>
                  <input id="menuCategory" class="input" placeholder="e.g., Breakfast / Drinks" />
                </div>
                <div>
                  <label class="label" for="menuImage">Image URL (optional)</label>
                  <input id="menuImage" class="input" placeholder="https://…" />
                </div>
              </div>
              <div class="grid2">
                <div>
                  <label class="label" for="menuActive">Active</label>
                  <select id="menuActive" class="input">
                    <option value="true" selected>Yes</option>
                    <option value="false">No</option>
                  </select>
                </div>
                <div class="form-actions">
                  <button class="btn btn-primary" type="submit">Save item</button>
                  <button id="cancelEditBtn" class="btn btn-ghost" type="button">Cancel</button>
                </div>
              </div>
            </form>

            <div class="divider"></div>

            <div class="panel-header">
              <h3>Menu items</h3>
              <div class="panel-actions">
                <input id="manageSearch" class="input" placeholder="Search items…" autocomplete="off" />
              </div>
            </div>
            <div id="manageList" class="manage-list" aria-live="polite"></div>
          </section>
        </div>
      </section>

      <section class="view" id="view-report" aria-label="Monthly report">
        <div class="layout one">
          <section class="panel">
            <div class="panel-header">
              <h2>Monthly Sales Report</h2>
              <div class="panel-actions">
                <button id="exportJsonBtn" class="btn btn-ghost" type="button">Export data (JSON)</button>
                <button id="clearSalesBtn" class="btn btn-ghost danger" type="button">Clear sales data</button>
              </div>
            </div>

            <div class="report-filters">
              <div>
                <label class="label" for="reportMonth">Month</label>
                <input id="reportMonth" class="input" type="month" />
              </div>
              <div>
                <label class="label" for="reportSearch">Search</label>
                <input id="reportSearch" class="input" placeholder="Customer / table / item…" />
              </div>
              <div class="report-summary">
                <div class="kpi">
                  <div class="kpi-label">Orders</div>
                  <div id="kpiOrders" class="kpi-value">0</div>
                </div>
                <div class="kpi">
                  <div class="kpi-label">Revenue</div>
                  <div id="kpiRevenue" class="kpi-value">₹0.00</div>
                </div>
              </div>
            </div>

            <div id="reportTable" class="report-table" aria-live="polite"></div>
          </section>
        </div>
      </section>
    </main>

    <dialog id="qrModal" class="modal no-print">
      <div class="modal-body">
        <div class="modal-header">
          <h3>Pay now</h3>
          <button id="closeQrBtn" class="icon-btn" type="button" aria-label="Close">✕</button>
        </div>

        <div class="qr-grid">
          <div>
            <div class="label">Amount</div>
            <div id="qrAmount" class="qr-amount">₹0.00</div>
            <div class="hint">Scan QR to pay. Phone: <strong>8248158746</strong></div>
          </div>
          <div class="qr-box">
            <div id="qrCode"></div>
          </div>
        </div>

        <div class="modal-actions">
          <button id="copyUpiBtn" class="btn btn-ghost" type="button">Copy UPI link</button>
          <button id="closeQrBtn2" class="btn btn-primary" type="button">Done</button>
        </div>
      </div>
    </dialog>
  </body>
</html>
